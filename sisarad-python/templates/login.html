<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SISARAD — Iniciar sesión</title>
  <link rel="stylesheet" href="/static/css/sisarad.css">
</head>
<body>
  <div class="loginPage">
    <div class="loginCard">
      <div class="imageBox">
        <img src="/static/images/logo.png" alt="Logo SISARAD">
      </div>
      <h1 class="loginTitle">SISARAD</h1>
      <p class="loginSubtitle">Sistema de Seguimiento Logístico</p>
      {% if error %}
      <div class="alert alertError">{{ error | replace('+', ' ') }}</div>
      {% endif %}
      {% if msg %}
      <div class="alert alertSuccess">{{ msg | replace('+', ' ') }}</div>
      {% endif %}
      <form method="post" action="/login" class="formGrid">
        <label>Usuario
          <input type="text" name="usuario" required autocomplete="username" placeholder="admin o encargado">
        </label>
        <label>Contraseña
          <input type="password" name="clave" required autocomplete="current-password" placeholder="Tu contraseña">
        </label>
        <button type="submit" class="buttonPrimary">Ingresar</button>
      </form>
      <p class="loginFooter">
        <a href="/recuperar-contrasena" class="loginLink">¿Olvidaste tu contraseña?</a>
      </p>
    </div>
  </div>
</body>
</html>
