<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}SISARAD{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/sisarad.css">
</head>
<body>
  <header class="header">
    <div class="toolbar">
      <div class="brandGroup">
        <button type="button" class="mobileMenuButton" id="mobileMenuBtn" aria-label="Menú" aria-expanded="false">
          <span></span>
        </button>
        <a href="/inicio" class="logo">SISARAD</a>
      </div>
      {% if user %}
      <div class="user">
        {% include "partials/notifications.html" %}
        <div class="userInfo">
          <a href="/mi-cuenta" class="userNameLink">{{ user.nombre }}</a>
          <span class="userRole">{{ role_label }}</span>
        </div>
        <a href="/logout">Salir</a>
      </div>
      {% endif %}
    </div>
  </header>

  <div class="appBody">
    <div class="navContainer">
      <div class="navBackdrop" id="navBackdrop"></div>
      <nav class="navBar" id="navBar">
        <button type="button" class="closeButton" id="closeNavBtn" aria-label="Cerrar menú">&times;</button>
        <ul class="ulNavBar">
          {% for item in menu_items|default([]) %}
          <li class="liNavBar {% if active == item.modulo %}active{% endif %}"><a href="{{ item.ruta }}">{{ item.etiqueta }}</a></li>
          {% endfor %}
        </ul>
      </nav>
    </div>
    <main id="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
