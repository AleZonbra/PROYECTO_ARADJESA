<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SISARAD — Recuperar contraseña</title>
  <link rel="stylesheet" href="/static/css/sisarad.css">
</head>
<body>
  <div class="loginPage">
    <div class="loginCard">
      <h1 class="loginTitle">Recuperar contraseña</h1>
      <p class="loginSubtitle">Ingresa tu usuario y el correo registrado en el sistema</p>
      {% if error %}
      <div class="alert alertError">{{ error | replace('+', ' ') }}</div>
      {% endif %}
      {% if msg %}
      <div class="alert alertSuccess">{{ msg | replace('+', ' ') }}</div>
      {% endif %}
      <form method="post" action="/recuperar-contrasena" class="formGrid">
        <label>Usuario
          <input type="text" name="usuario" required autocomplete="username" placeholder="Tu usuario de acceso">
        </label>
        <label>Correo electrónico
          <input type="email" name="correo" required autocomplete="email" placeholder="correo@ejemplo.com">
        </label>
        <button type="submit" class="buttonPrimary">Enviar enlace de recuperación</button>
      </form>
      <p class="loginFooter">
        <a href="/login" class="loginLink">Volver al inicio de sesión</a>
      </p>
    </div>
  </div>
</body>
</html>
